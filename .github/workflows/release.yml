name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build release binary
        run: swift build -c release

      - name: Package .app bundle
        run: bash scripts/make-app.sh

      # Optional: sign + notarize if secrets are configured
      - name: Sign and notarize
        if: ${{ env.CERTIFICATE_BASE64 != '' }}
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          NOTARYTOOL_APPLE_ID: ${{ secrets.NOTARYTOOL_APPLE_ID }}
          NOTARYTOOL_PASSWORD: ${{ secrets.NOTARYTOOL_PASSWORD }}
          NOTARYTOOL_TEAM_ID: ${{ secrets.NOTARYTOOL_TEAM_ID }}
        run: bash scripts/sign-and-notarize.sh

      - name: Create zip
        run: |
          cd dist
          zip -r ../ClaudeQuota.zip ClaudeQuota.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ClaudeQuota ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: ClaudeQuota.zip

      - name: Update Homebrew tap
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "$TAP_GITHUB_TOKEN" ]; then
            echo "TAP_GITHUB_TOKEN not set, skipping tap update"
            exit 0
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(shasum -a 256 ClaudeQuota.zip | awk '{print $1}')
          URL="https://github.com/joinnow-io/claude-quota/releases/download/${GITHUB_REF_NAME}/ClaudeQuota.zip"

          cat > /tmp/claude-quota.rb <<CASKEOF
cask "claude-quota" do
  version "${VERSION}"
  sha256 "${SHA256}"

  url "${URL}"
  name "ClaudeQuota"
  desc "Menu bar app showing Claude Code quota usage in real time"
  homepage "https://github.com/joinnow-io/claude-quota"

  depends_on macos: ">= :sonoma"

  app "ClaudeQuota.app"

  zap trash: [
    "~/Library/Preferences/com.clausequota.app.plist",
  ]
end
CASKEOF

          # Clone tap repo and update cask
          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/joinnow-io/homebrew-tap.git" /tmp/homebrew-tap
          mkdir -p /tmp/homebrew-tap/Casks
          cp /tmp/claude-quota.rb /tmp/homebrew-tap/Casks/claude-quota.rb
          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/claude-quota.rb
          git commit -m "Update claude-quota to ${VERSION}" || echo "No changes to commit"
          git push
