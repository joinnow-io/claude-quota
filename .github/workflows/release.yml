name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build release binary (universal)
        run: |
          swift build -c release --arch arm64
          swift build -c release --arch x86_64
          lipo -create \
            .build/arm64-apple-macosx/release/ClaudeQuota \
            .build/x86_64-apple-macosx/release/ClaudeQuota \
            -output .build/release/ClaudeQuota

      - name: Package .app bundle
        run: bash scripts/make-app.sh

      # Optional: sign + notarize if secrets are configured
      - name: Sign and notarize
        if: ${{ env.CERTIFICATE_BASE64 != '' }}
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          NOTARYTOOL_APPLE_ID: ${{ secrets.NOTARYTOOL_APPLE_ID }}
          NOTARYTOOL_PASSWORD: ${{ secrets.NOTARYTOOL_PASSWORD }}
          NOTARYTOOL_TEAM_ID: ${{ secrets.NOTARYTOOL_TEAM_ID }}
        run: bash scripts/sign-and-notarize.sh

      - name: Create zip
        run: |
          cd dist
          zip -r ../ClaudeQuota.zip ClaudeQuota.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ClaudeQuota ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: ClaudeQuota.zip

      - name: Update Homebrew tap
        if: ${{ !contains(github.ref_name, '-') }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(shasum -a 256 ClaudeQuota.zip | awk '{print $1}')
          URL="https://github.com/joinnow-io/claude-quota/releases/download/${GITHUB_REF_NAME}/ClaudeQuota.zip"
          bash scripts/update-tap.sh "$VERSION" "$SHA256" "$URL" "${{ secrets.TAP_GITHUB_TOKEN }}"
